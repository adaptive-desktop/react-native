name: Publish to npm on tag

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    name: Build (Bob) and Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies (immutable)
        run: yarn install --immutable

      - name: Build library with Builder Bob
        run: yarn library:build

      - name: Check version consistency
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi
          echo "Version check passed: $TAG_VERSION"

      - name: Configure Yarn npm registry
        run: |
          yarn config set npmRegistryServer https://registry.npmjs.org
          yarn config set npmPublishRegistry https://registry.npmjs.org
          yarn config set npmAlwaysAuth true

      - name: Validate npm token is present
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN secret is missing or empty."
            echo "Create an npm Automation token with publish rights to @adaptive-desktop/react-native and store it as NPM_TOKEN."
            exit 1
          fi

      - name: Verify npm authentication
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Checking npm auth with npm whoami..."
          npm whoami --registry https://registry.npmjs.org || {
            echo "npm authentication failed."
            echo "Ensure NPM_TOKEN is valid and not expired/revoked."
            exit 1
          }

      - name: Verify publish access to package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Checking publish access for @adaptive-desktop/react-native..."
          npm access ls-packages --json | node -e "const fs=require('fs');const data=JSON.parse(fs.readFileSync(0,'utf8'));const access=data['@adaptive-desktop/react-native'];if(!access){console.error('Token has no access to @adaptive-desktop/react-native.');console.error('Grant this npm user/team publish rights on the package.');process.exit(1)};console.log('Access level:',access)"

      - name: Publish to npm
        run: yarn npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
